_schema-version: '3.1'
ID: kits-cap-backend
version: 1.0.0
description: SAP CAP Node.js Backend for KITS replacing Python Flask
parameters:
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npx cds build --production

modules:
  - name: kits-cap-backend-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 512M
    requires:
      - name: kits-db
      - name: kits-uaa
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}

  - name: kits-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 256M
    requires:
      - name: kits-db

resources:
  - name: kits-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  - name: kits-uaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
